packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^6
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: ^0.2.0
  three: ^0.184.0
  "@types/three": ^0.184.1
  "@tanstack/ai": ^0.28.0
  "@tanstack/ai-openrouter": ^0.13.1
  zod: ^4.4.3
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  "@openrouter/sdk": true
  esbuild: true
  protobufjs: true
  sharp: true
  workerd: true
